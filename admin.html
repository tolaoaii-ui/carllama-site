<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CarLlama Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sand:#F5F0E8;--clay:#C2713A;--clay-light:#E8956A;--clay-dark:#8F4E22;--ink:#1A1410;--ink-mid:#4A3E35;--ink-light:#9A8878;--white:#FDFAF5;--serif:'Instrument Serif',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif}
body{font-family:var(--sans);background:var(--white);color:var(--ink);min-height:100vh}
.top{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid rgba(194,113,58,.12);background:rgba(253,250,245,.95);backdrop-filter:blur(12px)}
.top a.logo{font-family:var(--serif);font-size:1.5rem;color:var(--ink);text-decoration:none;letter-spacing:-.02em}
.top a.logo span{color:var(--clay);font-style:italic}
.top .who{font-size:.875rem;color:var(--ink-mid)}
.top .who a{color:var(--clay);text-decoration:none;margin-left:1rem;cursor:pointer}

/* Login card */
.login-wrap{min-height:calc(100vh - 80px);display:flex;align-items:center;justify-content:center;padding:2rem}
.login-card{background:var(--white);border:1.5px solid rgba(194,113,58,.2);border-radius:16px;padding:2.5rem;box-shadow:0 8px 40px rgba(194,113,58,.08);width:100%;max-width:420px}
.login-card h1{font-family:var(--serif);font-size:1.75rem;color:var(--ink);margin-bottom:.5rem}
.login-card .sub{color:var(--ink-mid);font-size:.9rem;margin-bottom:1.75rem}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
.form-group label{font-size:.7rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light)}
.form-group input{font-family:var(--sans);font-size:1rem;padding:.8rem .9rem;border:1.5px solid rgba(26,20,16,.12);border-radius:8px;background:var(--sand);outline:none}
.form-group input:focus{border-color:var(--clay);background:var(--white)}
.btn{width:100%;padding:.95rem;background:var(--clay);color:var(--white);font-size:1rem;font-weight:500;border:none;border-radius:8px;cursor:pointer;transition:background .2s}
.btn:hover:not(:disabled){background:var(--clay-dark)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:.85rem;color:#c2410c;margin-top:.75rem;min-height:1.2em}

/* Dashboard */
.wrap{max-width:1280px;margin:0 auto;padding:1.5rem 2rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat{background:var(--sand);padding:1.25rem;border-radius:12px;border:1px solid rgba(194,113,58,.12)}
.stat .label{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light);margin-bottom:.35rem}
.stat .val{font-family:var(--serif);font-size:2rem;color:var(--ink);line-height:1}
.stat .sub{font-size:.75rem;color:var(--ink-mid);margin-top:.35rem}

.actions{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.btn-action{padding:.7rem 1.25rem;border-radius:8px;border:none;background:var(--clay);color:var(--white);font-size:.875rem;font-weight:500;cursor:pointer}
.btn-action:hover:not(:disabled){background:var(--clay-dark)}
.btn-action:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{padding:.7rem 1.25rem;border-radius:8px;border:1.5px solid rgba(194,113,58,.25);background:var(--white);color:var(--clay-dark);font-size:.875rem;font-weight:500;cursor:pointer}
.btn-secondary:hover{background:var(--sand)}

h2{font-family:var(--serif);font-size:1.4rem;color:var(--ink);margin:1.5rem 0 1rem;letter-spacing:-.01em}
.lead-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.lead-card{background:var(--white);border:1px solid rgba(194,113,58,.15);border-radius:12px;overflow:hidden;transition:border-color .2s,transform .1s}
.lead-card:hover{border-color:var(--clay);transform:translateY(-2px)}
.lead-card .photo{background:var(--sand);aspect-ratio:16/10;overflow:hidden;display:flex;align-items:center;justify-content:center}
.lead-card .photo img{width:100%;height:100%;object-fit:cover}
.lead-card .photo .nophoto{font-size:.75rem;color:var(--ink-light)}
.lead-card .body{padding:.9rem}
.lead-card .title{font-weight:500;font-size:.95rem;color:var(--ink);margin-bottom:.35rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lead-card .meta{font-size:.75rem;color:var(--ink-light);margin-bottom:.5rem}
.pill{display:inline-block;font-size:.7rem;font-weight:600;padding:.2rem .55rem;border-radius:100px;letter-spacing:.02em}
.pill.pending{background:#fef2e6;color:#8f4e22}
.pill.hot{background:#16a34a;color:#fff}
.pill.check{background:#eab308;color:#fff}
.pill.retail{background:#ea580c;color:#fff}
.pill.over{background:#dc2626;color:#fff}
.pill.nocomps{background:#e5e7eb;color:#4b5563}
.result{font-size:.75rem;color:var(--ink-mid);margin-top:.5rem}
.result strong{color:var(--ink)}

.empty{text-align:center;padding:3rem 1rem;color:var(--ink-light);font-size:.95rem;background:var(--sand);border-radius:12px}

@media (max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .top{padding:1rem}
  .wrap{padding:1rem}
}
</style>
</head>
<body>

<div class="top">
  <a href="/" class="logo">Car<span>Llama</span> Admin</a>
  <div class="who">
    <span id="who-label"></span>
    <a id="logout-btn" style="display:none" onclick="logout()">Log out</a>
  </div>
</div>

<!-- Login -->
<div id="login-view" class="login-wrap">
  <div class="login-card">
    <h1>CarLlama Admin</h1>
    <p class="sub">Use your tolao.co credentials to sign in.</p>
    <form id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="email" autocomplete="username" required></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" autocomplete="current-password" required></div>
      <button type="submit" class="btn" id="login-btn">Sign in</button>
      <p class="err" id="login-err"></p>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div id="dash-view" class="wrap" style="display:none">
  <div class="stats">
    <div class="stat"><div class="label">Pending batch</div><div class="val" id="s-pending">—</div><div class="sub">waiting to be appraised</div></div>
    <div class="stat"><div class="label">Batched</div><div class="val" id="s-batched">—</div><div class="sub">scored & ready</div></div>
    <div class="stat"><div class="label">Total submissions</div><div class="val" id="s-total">—</div><div class="sub">all time</div></div>
    <div class="stat"><div class="label">Global queue</div><div class="val" id="s-queue">—</div><div class="sub">jobs in Lobster</div></div>
  </div>

  <div class="actions">
    <button class="btn-action" id="batch-btn" onclick="triggerBatch()">Batch Pending Leads</button>
    <button class="btn-secondary" onclick="refresh()">Refresh</button>
  </div>

  <h2>Recent submissions</h2>
  <div id="recent" class="lead-grid">
    <div class="empty">Loading...</div>
  </div>
</div>

<script>
const API = "https://dashboard.tolao.co";
const TOKEN_KEY = "carllama_admin_token";
const EMAIL_KEY = "carllama_admin_email";

const $ = id => document.getElementById(id);

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t, email) { localStorage.setItem(TOKEN_KEY, t); if (email) localStorage.setItem(EMAIL_KEY, email); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(EMAIL_KEY); }

function showLogin() {
  $("login-view").style.display = "flex";
  $("dash-view").style.display = "none";
  $("who-label").textContent = "";
  $("logout-btn").style.display = "none";
}

function showDash() {
  $("login-view").style.display = "none";
  $("dash-view").style.display = "block";
  $("who-label").textContent = localStorage.getItem(EMAIL_KEY) || "";
  $("logout-btn").style.display = "inline";
}

async function api(path, opts = {}) {
  const token = getToken();
  const res = await fetch(API + path, {
    ...opts,
    headers: { "Content-Type": "application/json", Authorization: "Bearer " + token, ...(opts.headers || {}) },
  });
  if (res.status === 401 || res.status === 403) {
    clearToken();
    showLogin();
    throw new Error("unauthorized");
  }
  return res;
}

$("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("login-btn"); btn.disabled = true; btn.textContent = "Signing in...";
  $("login-err").textContent = "";
  try {
    const email = $("email").value.trim();
    const password = $("password").value;
    const res = await fetch(API + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok || !data.token) {
      $("login-err").textContent = data.error === "invalid_credentials" ? "Wrong email or password." : (data.error || "Sign-in failed.");
      btn.disabled = false; btn.textContent = "Sign in";
      return;
    }
    if (data.role !== "admin") {
      $("login-err").textContent = "Admin access required.";
      btn.disabled = false; btn.textContent = "Sign in";
      return;
    }
    setToken(data.token, email);
    showDash();
    await refresh();
  } catch (err) {
    $("login-err").textContent = "Connection error. Try again.";
    btn.disabled = false; btn.textContent = "Sign in";
  }
});

function logout() { clearToken(); showLogin(); }

async function refresh() {
  try {
    const res = await api("/api/admin/carllama-summary");
    if (!res.ok) throw new Error("summary fetch failed");
    const data = await res.json();
    $("s-pending").textContent = data.pending;
    $("s-batched").textContent = data.batched;
    $("s-total").textContent = data.total;
    $("s-queue").textContent = data.globalQueueSize;
    $("batch-btn").disabled = data.pending === 0;
    $("batch-btn").textContent = data.pending === 0 ? "No pending leads" : `Batch ${data.pending} Pending Lead${data.pending === 1 ? "" : "s"}`;
    renderRecent(data.recent);
  } catch (err) {
    if (err.message !== "unauthorized") console.error(err);
  }
}

function renderRecent(leads) {
  const el = $("recent");
  if (!leads?.length) { el.innerHTML = '<div class="empty">No submissions yet.</div>'; return; }

  const fmt$ = v => v != null ? ("$" + Math.round(+v).toLocaleString()) : "—";
  const scorePill = (lead) => {
    if (lead._noComps) return '<span class="pill nocomps">no comps</span>';
    const s = lead._dealScore;
    if (!s) return '<span class="pill pending">pending</span>';
    return `<span class="pill ${s}">${s}</span>`;
  };

  el.innerHTML = leads.map(l => {
    const va = l._vAutoAppraisal || {};
    const photo = l.vehicle?.primaryPhoto || "";
    const title = (l.vehicle?.title || "").replace(/</g, "&lt;");
    const vin = l.vehicle?.vin ? l.vehicle.vin : "no VIN";
    const miles = l.vehicle?.mileage || "";
    const ask = l.seller?.askingPrice || "";
    const result = (l.status === "pending_evaluation" || !va.marketPrice)
      ? `<div class="result">Asking: <strong>${ask || "—"}</strong></div>`
      : `<div class="result">Market <strong>${fmt$(va.marketPrice)}</strong> · ${va.profit != null ? (va.profit >= 0 ? "profit " : "loss ") + fmt$(Math.abs(va.profit)) : ""}</div>`;
    return `
      <div class="lead-card">
        <div class="photo">${photo ? `<img src="${photo}" onerror="this.remove()">` : '<span class="nophoto">no photo</span>'}</div>
        <div class="body">
          <div class="title">${title}</div>
          <div class="meta">${vin}${miles ? " · " + miles + " mi" : ""}</div>
          ${scorePill(l)}
          ${result}
        </div>
      </div>`;
  }).join("");
}

async function triggerBatch() {
  const btn = $("batch-btn"); btn.disabled = true; btn.textContent = "Stamping batch...";
  try {
    const res = await api("/api/admin/carllama-batch-stamp", { method: "POST" });
    const data = await res.json();
    if (data.ok) {
      btn.textContent = `✓ ${data.queued} lead${data.queued === 1 ? "" : "s"} queued`;
      setTimeout(refresh, 1500);
    } else {
      btn.textContent = "Batch failed — retry";
      btn.disabled = false;
    }
  } catch (err) {
    if (err.message !== "unauthorized") { btn.textContent = "Error — retry"; btn.disabled = false; }
  }
}

// Init
if (getToken()) { showDash(); refresh(); setInterval(refresh, 30000); }
else { showLogin(); }
</script>

</body>
</html>
